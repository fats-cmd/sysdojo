# Self-host infrastructure. Currently just Postgres; run the API and app
# on the host (see README). Matches the DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sysdojo
      POSTGRES_PASSWORD: sysdojo
      POSTGRES_DB: sysdojo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sysdojo -d sysdojo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
